<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codari | Software a medida</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap');

    :root {
      --primary: #1d4ed8;
      --primary-dark: #1e40af;
      --text: #0f172a;
      --muted: #5b6477;
      --bg: #f9f9ff;
      --surface: #ffffff;
      --surface-soft: #dfe7ff;
      --shadow: 0 18px 35px rgba(15, 23, 42, 0.12);
      --radius: 14px;
      --container: 1160px;
      --font-title: "Space Grotesk", "Segoe UI", Roboto, Arial, sans-serif;
      --font-body: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      line-height: 1.35;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(100% - 2.5rem, var(--container));
      margin-inline: auto;
    }

    .site-header {
      background: var(--surface);
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-content {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      line-height: 1;
    }

    .logo img {
      width: clamp(130px, 14vw, 170px);
      height: auto;
    }

    .nav-toggle {
      display: none;
      border: 0;
      background: transparent;
      font-size: 1.9rem;
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }

    .nav-wrap {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 1.45rem;
      align-items: center;
    }

    .nav-list a {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      transition: color 0.2s ease;
      padding-bottom: 0.15rem;
      border-bottom: 2px solid transparent;
    }

    .nav-list a:hover,
    .nav-list a:focus-visible {
      color: var(--primary);
      outline: none;
    }

    .nav-list .active {
      color: var(--primary);
      border-color: #94b5ff;
    }

    .cta-top {
      font-family: "Inter", sans-serif;
      border: none;
      border-radius: 7px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.68rem 1.4rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .cta-top:hover {
      background: var(--primary-dark);
    }

    .hero {
      padding: clamp(2.4rem, 5vw, 4.6rem) 0 clamp(2.8rem, 5vw, 5.6rem);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.03fr 1fr;
      align-items: center;
      gap: clamp(1.7rem, 3vw, 2.8rem);
    }

    .hero h1 {
      font-family: var(--font-title);
      font-size: clamp(1.8rem, 4.3vw, 3.6rem);
      line-height: 1.03;
      letter-spacing: -0.03em;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .hero h1 .highlight {
      color: var(--primary);
    }

    .hero p {
      font-size: clamp(0.9rem, 1.35vw, 1.2rem);
      color: var(--muted);
      max-width: 33ch;
      margin-bottom: 1.8rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .btn {
      font-family: "Inter", sans-serif;
      border: none;
      border-radius: 8px;
      padding: 0.84rem 1.25rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: var(--surface-soft);
      color: #2f5bd6;
    }

    .hero-image {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 360px;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 980px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }

      .hero-text {
        order: 2;
      }

      .hero-image {
        order: 1;
        min-height: 300px;
      }
    }

    @media (max-width: 860px) {
      .nav-toggle {
        display: inline-flex;
      }

      .nav-wrap {
        position: absolute;
        left: 0;
        right: 0;
        top: 76px;
        background: var(--surface);
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
        padding: 1.1rem 1.25rem 1.3rem;
        transform: translateY(-130%);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }

      .nav-wrap.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .nav-list {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }

      .cta-top {
        width: 100%;
      }
    }

    @media (max-width: 600px) {
      .container {
        width: min(100% - 1.4rem, var(--container));
      }

      .btn {
        width: 100%;
      }

      .hero-image {
        min-height: 240px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <a href="#" class="logo" aria-label="Codari">
        <img src="logo_codari.png" alt="Codari" />
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="navWrap">☰</button>

      <div class="nav-wrap" id="navWrap">
        <nav aria-label="Principal">
          <ul class="nav-list">
            <li><a href="#" class="active">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Proceso</a></li>
            <li><a href="#">Proyectos</a></li>
            <li><a href="#">Contacto</a></li>
          </ul>
        </nav>
        <button class="cta-top">Hablemos</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-text">
          <h1>
            Transformamos<br />
            empresas y<br />
            organizaciones con<br />
            <span class="highlight">software a medida</span>
          </h1>
          <p>Ya sea una empresa o una institución, diseñamos soluciones digitales que mejoran tu operación y potencian tu crecimiento.</p>
          <div class="hero-actions">
            <button class="btn btn-primary">Agendar reunión</button>
            <button class="btn btn-secondary">Ver Servicios</button>
          </div>
        </div>

        <figure class="hero-image">
          <img src="imagenHero.jpg" alt="Representación digital del desarrollo de software" />
        </figure>
      </div>
    </section>
  </main>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navWrap = document.getElementById('navWrap');

    navToggle.addEventListener('click', () => {
      const isOpen = navWrap.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', String(isOpen));
      navToggle.textContent = isOpen ? '✕' : '☰';
    });
  </script>
</body>
</html>
